<!DOCTYPE html>
<html>
<head><title>數學計算</title></head>
<body>
    <h2>次方與根號計算器</h2>
    <form action="/math" method="POST">
        x: <input type="number" name="x" step="any" required><br><br>
        運算: 
        <select name="opt">
            <option value="∧">∧ (次方)</option>
            <option value="√">√ (根號)</option>
        </select><br><br>
        y: <input type="number" name="y" step="any" required><br><br>
        <button type="submit">計算</button>
    </form>
</body>
</html>
